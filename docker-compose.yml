services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-server
    ports:
      - "8081:8080"
    volumes:
      # Mount your LM Studio models folder — shared, no duplication
      - C:\Users\User\.lmstudio\models:/models:ro
    networks:
      - ai-stack
    # Default: Gemma 3 12B (your most versatile model)
    # Change the model path below to load a different one
    command: >
      --host 0.0.0.0
      --port 8080
      --model /models/TrevorJS/gemma-4-E2B-it-uncensored-GGUF/gemma-4-E2B-it-uncensored-Q8_0.gguf
      --ctx-size 32768
      --threads 8
      --n-gpu-layers -1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  hermes:
    build:
      context: ./docker/hermes-agent
    container_name: hermes
    command: hermes gateway run
    ports:
      - "8642:8642"
    volumes:
      - hermes-data:/root/.hermes
    networks:
      - ai-stack
    environment:
      - OPENAI_API_BASE=http://llama-server:8080/v1
      - OPENAI_BASE_URL=http://llama-server:8080/v1
      - OPENAI_API_KEY=sk-local-no-key-required-1234567890
      - HERMES_INFERENCE_PROVIDER=llamacpp
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8642
      - API_SERVER_KEY=hermes-local-dev
      - GATEWAY_ALLOW_ALL_USERS=true
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    restart: unless-stopped

  hermes-workspace:
    image: node:22-slim
    container_name: hermes-workspace
    working_dir: /workspace
    ports:
      - "3000:3000"
    volumes:
      - hermes-workspace-app:/workspace
    networks:
      - ai-stack
    environment:
      - HERMES_API_URL=http://hermes:8642
      - HERMES_API_KEY=hermes-local-dev
      - HERMES_API_TOKEN=hermes-local-dev
    command: >
      bash -c "
        if [ ! -f /workspace/package.json ]; then
          apt-get update && apt-get install -y git &&
          git clone https://github.com/outsourc-e/hermes-workspace.git /tmp/hw &&
          mv /tmp/hw/* /tmp/hw/.* /workspace/ 2>/dev/null || true &&
          rm -rf /tmp/hw &&
          npm install -g pnpm && pnpm install;
        fi &&
        npm install -g pnpm 2>/dev/null;
        pnpm dev --host 0.0.0.0
      "
    depends_on:
      - hermes
    restart: unless-stopped

networks:
  ai-stack:
    # Host-isolated but internet-enabled
    driver: bridge

volumes:
  hermes-data:
  hermes-workspace-app:
